<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6 Months Together 💙</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    color:white;
}

/* Progress Bar */
.progress{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:4px;
    background:rgba(255,255,255,0.1);
    z-index:9999;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#60a5fa;
    transition:0.4s;
}

/* Slides */
.wrapper{
    width:100%;
    height:100vh;
    overflow:hidden;
}

.slides{
    transition:transform .8s ease;
}

.slide{
    height:100vh;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    position:relative;
    padding:20px;
}

.blue{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
}

.grey{
    background:linear-gradient(135deg,#111827,#374151);
}

.card{
    max-width:800px;
    background:rgba(255,255,255,0.07);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    padding:35px;
    border-radius:25px;
    box-shadow:0 0 30px rgba(255,255,255,0.05);
}

h1{
    font-size:2.5rem;
    margin-bottom:15px;
}

.story{
    font-size:1.15rem;
    line-height:1.8;
    min-height:90px;
}

.shayari{
    margin-top:25px;
    font-style:italic;
    color:#dbeafe;
    line-height:1.8;
    min-height:80px;
}

.nextBtn{
    position:absolute;
    bottom:35px;
    right:25px;
    padding:12px 20px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:15px;
    transition:.3s;
}

.nextBtn:hover{
    transform:scale(1.05);
}

.swipe{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    opacity:.7;
    animation:bounce 1.5s infinite;
}

@keyframes bounce{
    0%,100%{transform:translate(-50%,0);}
    50%{transform:translate(-50%,-8px);}
}

/* Floating Hearts */
.heart{
    position:fixed;
    bottom:-30px;
    opacity:.3;
    animation:floatUp linear infinite;
    pointer-events:none;
}

@keyframes floatUp{
    from{
        transform:translateY(0) scale(1);
        opacity:0;
    }
    to{
        transform:translateY(-120vh) scale(1.6);
        opacity:1;
    }
}

.final-title{
    font-size:3rem;
    margin-bottom:20px;
}

.final-heart{
    font-size:3rem;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.15);}
    100%{transform:scale(1);}
}

@media(max-width:768px){

h1{
    font-size:2rem;
}

.story,
.shayari{
    font-size:1rem;
}

.card{
    padding:25px;
}
}
</style>
</head>

<body>

<div class="progress">
    <div class="progress-bar" id="bar"></div>
</div>

<div class="wrapper">
    <div class="slides" id="slides">

        <!-- Slide 1 -->
        <section class="slide blue">
            <div class="card">
                <h1></h1>
                <div class="story"></div>
                <div class="shayari"></div>
            </div>
            <div class="swipe">⬆ Swipe Up</div>
            <button class="nextBtn" onclick="nextSlide()">Next ➜</button>
        </section>

        <!-- Slide 2 -->
        <section class="slide grey">
            <div class="card">
                <h1></h1>
                <div class="story"></div>
                <div class="shayari"></div>
            </div>
            <button class="nextBtn" onclick="nextSlide()">Next ➜</button>
        </section>

        <!-- Slide 3 -->
        <section class="slide blue">
            <div class="card">
                <h1></h1>
                <div class="story"></div>
                <div class="shayari"></div>
            </div>
            <button class="nextBtn" onclick="nextSlide()">Next ➜</button>
        </section>

        <!-- Slide 4 -->
        <section class="slide grey">
            <div class="card">
                <h1></h1>
                <div class="story"></div>
                <div class="shayari"></div>
            </div>
            <button class="nextBtn" onclick="nextSlide()">Next ➜</button>
        </section>

        <!-- Slide 5 -->
        <section class="slide blue">
            <div class="card">
                <h1></h1>
                <div class="story"></div>
                <div class="shayari"></div>
            </div>
            <button class="nextBtn" onclick="nextSlide()">Next ➜</button>
        </section>

        <!-- Slide 6 -->
        <section class="slide grey">
            <div class="card">
                <h1></h1>
                <div class="story"></div>
                <div class="shayari"></div>
            </div>
            <button class="nextBtn" onclick="nextSlide()">Next ➜</button>
        </section>

        <!-- Slide 7 -->
        <section class="slide blue">
            <div class="card">
                <h1></h1>
                <div class="story"></div>
                <div class="shayari"></div>
            </div>
            <button class="nextBtn" onclick="nextSlide()">Next ➜</button>
        </section>

        <!-- Slide 8 -->
        <section class="slide grey">
            <div class="card">
                <div class="final-title">6 Months Together 💙</div>
                <div class="story">
                    From strangers to an irreplaceable bond...<br>
                    and this is only the beginning.
                </div>

                <div class="shayari">
                    "6 mahine sirf waqt nahi the,<br>
                    Ye har din tumhare aur kareeb aane ka safar tha. ❤️"
                    <br><br>
                    "And if these six months felt this beautiful...<br>
                    Imagine the rest of our story. ✨"
                </div>

                <div class="final-heart">💙</div>
            </div>
        </section>

    </div>
</div>

<script>

const slidesData = [

{
title:"The Unexpected Person",
story:"We met by accident. No plans. No expectations. No idea that one day, Dudu would become such an important part of my life.",
shayari:"Kabhi kabhi zindagi sabse khoobsurat cheezein,<br>bina bataye de deti hai."
},

{
title:"🌙 The Nights We Never Counted",
story:"Somewhere between the late-night calls, the endless conversations, and the 'one more minute' before sleeping... Dudu became the favourite part of my day.",
shayari:"Neend se zyada intezaar tumhara tha,<br>Aur subah se zyada pasand tumhari awaaz."
},

{
title:"❤️ When It Started Feeling Like Home",
story:"One day, it stopped feeling like just a conversation. Somehow, Dudu became my comfort, my habit, and my safe place.",
shayari:"Tum mile toh laga,<br>Jaise dil ko uski jagah mil gayi."
},

{
title:"🥺 Through Every Fight",
story:"We fought. We got upset. We misunderstood each other. But no matter what happened, I never wanted a life where Dudu wasn't in it.",
shayari:"Har baar tootne se pehle,<br>Humne ek dusre ko pakad liya."
},

{
title:"💌 Dear Dudu...",
story:"Thank you for every call. Thank you for every smile. Thank you for every sleepless night. Thank you for every memory. Thank you for being you.",
shayari:""
},

{
title:"✨ Final Slide",
story:"From a random Instagram reply... To my favourite person. Dudu ❤️<br><br>Happy 6 Months.",
shayari:""
}

];

];

let current = 0;

const slidesContainer = document.getElementById("slides");
const progressBar = document.getElementById("bar");

function typeEffect(element,text,speed=25){
    element.innerHTML="";
    let i=0;

    const timer=setInterval(()=>{
        if(i<text.length){
            element.innerHTML+=text.charAt(i);
            i++;
        }else{
            clearInterval(timer);
        }
    },speed);
}

function renderSlides(){

    const slides=document.querySelectorAll(".slide");

    slides.forEach((slide,index)=>{

        if(index < slidesData.length){

            slide.querySelector("h1").textContent="";
            slide.querySelector(".story").innerHTML="";
            slide.querySelector(".shayari").innerHTML="";

            if(index===current){

                typeEffect(
                    slide.querySelector("h1"),
                    slidesData[index].title,
                    40
                );

                setTimeout(()=>{
                    slide.querySelector(".story").innerHTML=
                    slidesData[index].story;
                },800);

                setTimeout(()=>{
                    slide.querySelector(".shayari").innerHTML=
                    slidesData[index].shayari;
                },1400);
            }
        }
    });

    slidesContainer.style.transform=
    `translateY(-${current * 100}vh)`;

    progressBar.style.width=
    ((current+1)/8)*100 + "%";
}

function nextSlide(){
    if(current<7){
        current++;
        renderSlides();
    }
}

function prevSlide(){
    if(current>0){
        current--;
        renderSlides();
    }
}

/* Touch Swipe */

let startY=0;

window.addEventListener("touchstart",(e)=>{
    startY=e.touches[0].clientY;
});

window.addEventListener("touchend",(e)=>{

    let endY=e.changedTouches[0].clientY;

    if(startY-endY>50){
        nextSlide();
    }

    if(endY-startY>50){
        prevSlide();
    }
});

/* Keyboard */

window.addEventListener("keydown",(e)=>{

    if(e.key==="ArrowDown"){
        nextSlide();
    }

    if(e.key==="ArrowUp"){
        prevSlide();
    }
});

/* Floating Hearts */

for(let i=0;i<25;i++){

    const heart=document.createElement("div");

    heart.className="heart";
    heart.innerHTML=Math.random()>0.5?"💙":"✨";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(14+Math.random()*20)+"px";
    heart.style.animationDuration=(5+Math.random()*8)+"s";

    document.body.appendChild(heart);
}

renderSlides();

</script>

</body>
</html>
